<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦷 이살리는치과 신논현 · 재료/소모품 대시보드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:#0d1117;color:#e2e8f0;min-height:100vh}

/* ─── HEADER ─── */
.header{background:linear-gradient(135deg,#161b2e 0%,#0d1117 100%);padding:20px 28px;border-bottom:1px solid #21262d;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-left h1{font-size:20px;font-weight:800;color:#fff}
.header-left h1 span{color:#58a6ff}
.header-left .sub{font-size:12px;color:#8b949e;margin-top:3px}
.header-right{font-size:11px;color:#6e7681;background:#161b2e;padding:5px 12px;border-radius:20px;border:1px solid #21262d}

/* ─── TABS ─── */
.tab-wrap{display:flex;background:#0d1117;padding:16px 28px 0;gap:4px;border-bottom:1px solid #21262d}
.tab{padding:9px 22px;border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;font-weight:600;color:#8b949e;border:1px solid transparent;border-bottom:none;transition:all .2s}
.tab.active{background:#161b2e;color:#58a6ff;border-color:#21262d;border-bottom-color:#161b2e}
.tab:hover:not(.active){color:#c9d1d9}

/* ─── CONTENT ─── */
.content{padding:20px 28px}

/* ─── SUMMARY ─── */
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.s-card{background:#161b2e;border:1px solid #21262d;border-radius:10px;padding:14px 16px;text-align:center}
.s-num{font-size:28px;font-weight:800;line-height:1}
.s-label{font-size:12px;color:#8b949e;margin-top:4px}
.s-sub{font-size:11px;color:#6e7681;margin-top:2px}

/* ─── MONTH BUTTONS ─── */
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.controls label{font-size:12px;color:#8b949e}
.month-btn{padding:6px 13px;border-radius:20px;border:1px solid #21262d;background:#161b2e;color:#8b949e;cursor:pointer;font-size:12px;transition:all .2s;font-family:inherit}
.month-btn:hover{border-color:#388bfd;color:#58a6ff}
.month-btn.active{background:#1f3056;border-color:#58a6ff;color:#fff;font-weight:600}

/* ─── TEAM GRID ─── */
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.card{background:#161b2e;border:1px solid #21262d;border-radius:12px;padding:18px}
.card-full{grid-column:1/-1}
.card-title{font-size:13px;font-weight:700;color:#e6edf3;margin-bottom:3px;display:flex;align-items:center;gap:8px}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.ba{background:#1c3a6e;color:#79c0ff}
.bb{background:#1a4035;color:#56d364}
.ball{background:#2d1b69;color:#d2a8ff}
.card-sub{font-size:11px;color:#6e7681;margin-bottom:14px}
.rank-list{display:flex;flex-direction:column;gap:5px}
.rank-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;background:#0d1117;border:1px solid #21262d;cursor:pointer;transition:all .15s;position:relative}
.rank-item:hover{background:#1c2538;border-color:#388bfd}
.rank-item.clickable:hover::after{content:"📈 클릭시 월별 추이";position:absolute;right:8px;font-size:10px;color:#58a6ff;opacity:.8}
.rn{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.r1{background:#bf8700;color:#ffe566}.r2{background:#4a5568;color:#e2e8f0}.r3{background:#6b3a1f;color:#ffa657}.ro{background:#21262d;color:#6e7681;font-size:10px}
.rname{flex:1;font-size:12px;color:#c9d1d9;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.rbar-w{width:70px;flex-shrink:0}
.rbar-bg{height:5px;background:#21262d;border-radius:3px;overflow:hidden}
.rbar-fill{height:100%;border-radius:3px;transition:width .4s}
.fill-a{background:linear-gradient(90deg,#1f6feb,#388bfd)}
.fill-b{background:linear-gradient(90deg,#1a7f37,#2ea043)}
.fill-all{background:linear-gradient(90deg,#6e40c9,#a371f7)}
.rqty{width:32px;text-align:right;font-size:12px;font-weight:700;color:#e3b341;flex-shrink:0}
.empty-msg{text-align:center;color:#6e7681;font-size:12px;padding:24px}

/* ─── DIVIDER ─── */
.divider{height:1px;background:#21262d;margin:20px 0}

/* ─── PIE SECTION ─── */
.pie-sec-title{font-size:15px;font-weight:700;color:#e6edf3;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.pie-sec-title::before{content:'';width:4px;height:18px;background:#388bfd;border-radius:2px;display:block}
.pie-grid{display:grid;grid-template-columns:260px 1fr;gap:24px;align-items:center}
.donut-wrap{position:relative;width:240px;height:240px;margin:0 auto}
.donut-wrap svg{width:100%;height:100%}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.dc-num{font-size:24px;font-weight:800;color:#fff;line-height:1}
.dc-lbl{font-size:10px;color:#8b949e;margin-top:3px}
.legend{display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto;padding-right:4px}
.legend::-webkit-scrollbar{width:3px}
.legend::-webkit-scrollbar-track{background:#0d1117}
.legend::-webkit-scrollbar-thumb{background:#21262d;border-radius:2px}
.leg-item{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:6px;cursor:pointer;transition:background .15s}
.leg-item:hover{background:#1c2538}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.leg-name{flex:1;font-size:12px;color:#8b949e;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.leg-pct{font-size:12px;font-weight:700;color:#fff;flex-shrink:0;width:36px;text-align:right}
.leg-qty{font-size:11px;color:#6e7681;flex-shrink:0;width:38px;text-align:right}

/* ─── ITEM TREND MODAL ─── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#161b2e;border:1px solid #21262d;border-radius:16px;padding:24px;width:min(740px,96vw);max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:12px}
.modal-title{font-size:14px;font-weight:700;color:#e6edf3;line-height:1.4;flex:1}
.modal-close{background:none;border:none;color:#8b949e;font-size:20px;cursor:pointer;flex-shrink:0;line-height:1;padding:0 4px}
.modal-close:hover{color:#e6edf3}
.chart-area{position:relative;height:220px;margin-bottom:8px}
.chart-canvas{position:absolute;inset:0;width:100%;height:100%}
.chart-legend{display:flex;gap:16px;justify-content:center;margin-bottom:16px}
.cl-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#8b949e}
.cl-dot{width:12px;height:4px;border-radius:2px}
.modal-table{width:100%;border-collapse:collapse;font-size:12px}
.modal-table th{background:#0d1117;color:#8b949e;padding:7px 10px;text-align:center;border-bottom:1px solid #21262d;font-weight:600}
.modal-table td{padding:7px 10px;text-align:center;border-bottom:1px solid #21262d;color:#c9d1d9}
.modal-table tr:hover td{background:#1c2538}
.td-total{font-weight:700;color:#e3b341}
.td-a{color:#79c0ff}.td-b{color:#56d364}

/* ─── TOOLTIP ─── */
.tooltip{position:fixed;background:#161b2e;border:1px solid #21262d;border-radius:8px;padding:7px 11px;font-size:12px;color:#e6edf3;pointer-events:none;z-index:999;max-width:300px;word-break:break-word;display:none;box-shadow:0 4px 16px rgba(0,0,0,.5)}

@media(max-width:720px){
  .team-grid{grid-template-columns:1fr}
  .card-full{grid-column:1}
  .pie-grid{grid-template-columns:1fr}
  .summary-row{grid-template-columns:1fr 1fr 1fr;gap:8px}
  .s-num{font-size:20px}
}
</style>
</head>

    <div class="sub">2025.07 ~ 2026.04 · 위치(벤딩=재료 / 큐브=소모품) 기준 분류 · 품목 클릭 시 월별 추이 확인</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">

      <div class="cl-item"><div class="cl-dot" style="background:#79c0ff"></div>A팀</div>

</div>

const COLORS=['#388bfd','#2ea043','#e3b341','#f78166','#a371f7','#79c0ff','#56d364','#ffa657','#ff7b72','#d2a8ff'];
let tab='material', month=null;

function switchTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',(i===0&&t==='material')||(i===1&&t==='supply'));
  });
  month=DATA[tab].months[DATA[tab].months.length-1];
  render();
}

function render(){renderSummary();renderMonths();renderGrid();renderDonut();}

function renderSummary(){
  const d=DATA[tab].monthly[month];
  const aT=d['A팀'].reduce((s,i)=>s+i.qty,0);
  const bT=d['B팀'].reduce((s,i)=>s+i.qty,0);
  const allT=d['전체'].reduce((s,i)=>s+i.qty,0);
  const lbl=tab==='material'?'재료':'소모품';
  document.getElementById('summary-row').innerHTML=`
    <div class="s-card"><div class="s-num" style="color:#58a6ff">${allT}</div><div class="s-label">${month} 전체 수량</div><div class="s-sub">${lbl} 총 사용량</div></div>
    <div class="s-card"><div class="s-num" style="color:#79c0ff">${aT}</div><div class="s-label">A팀 사용량</div><div class="s-sub">${d['A팀'].length}개 품목</div></div>
    <div class="s-card"><div class="s-num" style="color:#56d364">${bT}</div><div class="s-label">B팀 사용량</div><div class="s-sub">${d['B팀'].length}개 품목</div></div>`;
}

function renderMonths(){
  const months=DATA[tab].months;
  const lbl={'2025-07':'25.07','2025-08':'25.08','2025-09':'25.09','2025-10':'25.10','2025-11':'25.11','2025-12':'25.12','2026-01':'26.01','2026-02':'26.02','2026-03':'26.03','2026-04':'26.04'};
  document.getElementById('month-buttons').innerHTML=months.map(m=>
    `<button class="month-btn ${m===month?'active':''}" onclick="selMonth('${m}')">${lbl[m]||m}</button>`
  ).join('');
}

function selMonth(m){month=m;render();}

const trends=()=>DATA[tab].item_trends;
const hasTrend=(name)=>!!trends()[name];

function renderGrid(){
  const d=DATA[tab].monthly[month];
  const configs=[
    {key:'A팀',label:'A팀 사용 현황',badge:'ba',fill:'fill-a'},
    {key:'B팀',label:'B팀 사용 현황',badge:'bb',fill:'fill-b'},
    {key:'전체',label:'전체 통합 순위',badge:'ball',fill:'fill-all'}
  ];
  let html='';
  configs.forEach(cfg=>{
    const items=d[cfg.key]||[];
    const max=items.length?items[0].qty:1;
    const listHtml=items.length===0?'<div class="empty-msg">데이터 없음</div>':
      items.slice(0,10).map((item,i)=>{
        const pct=Math.round(item.qty/max*100);
        const rCls=i===0?'r1':i===1?'r2':i===2?'r3':'ro';
        const clickable=hasTrend(item.name)?'clickable':'';
        const escName=item.name.replace(/'/g,"\'").replace(/"/g,'&quot;');
        return `<div class="rank-item ${clickable}" onclick="openTrend('${escName}')" onmouseenter="tip(event,'${escName} · ${item.qty}개${hasTrend(item.name)?'\n📈 클릭하면 월별 추이 확인':''}')" onmouseleave="hideTip()">
          <div class="rn ${rCls}">${i+1}</div>
          <div class="rname" title="${escName}">${item.name}</div>
          <div class="rbar-w"><div class="rbar-bg"><div class="rbar-fill ${cfg.fill}" style="width:${pct}%"></div></div></div>
          <div class="rqty">${item.qty}</div>
        </div>`;
      }).join('');
    const fullCls=cfg.key==='전체'?' card-full':'';
    html+=`<div class="card${fullCls}"><div class="card-title">${cfg.label}<span class="badge ${cfg.badge}">${cfg.key}</span></div><div class="card-sub">${month} 기준 · 상위 10개 품목</div><div class="rank-list">${listHtml}</div></div>`;
  });
  document.getElementById('team-grid').innerHTML=html;
}

function renderDonut(){
  const pie=DATA[tab].pie;
  const total=pie.reduce((s,i)=>s+i.qty,0);
  document.getElementById('dc-num').textContent=total.toLocaleString();
  document.getElementById('pie-title').textContent=`전체 기간 품목별 사용 비중 · ${tab==='material'?'재료':'소모품'} (상위 10개)`;
  const svg=document.getElementById('donut-svg');
  const cx=100,cy=100,r=82,ri=55;
  let angle=-90,paths='';
  pie.forEach((item,i)=>{
    const pct=item.qty/total,sweep=pct*360;
    const s=deg(cx,cy,r,angle),e=deg(cx,cy,r,angle+sweep-0.6);
    const si=deg(cx,cy,ri,angle),ei=deg(cx,cy,ri,angle+sweep-0.6);
    const large=sweep>180?1:0;
    const c=COLORS[i%COLORS.length];
    const escName=item.name.replace(/'/g,"\'");
    paths+=`<path d="M ${s.x} ${s.y} A ${r} ${r} 0 ${large} 1 ${e.x} ${e.y} L ${ei.x} ${ei.y} A ${ri} ${ri} 0 ${large} 0 ${si.x} ${si.y} Z" fill="${c}" opacity=".9" style="cursor:pointer;transition:opacity .15s" onmouseenter="this.style.opacity=1;tip(event,'${escName}\n수량: ${item.qty} (${(pct*100).toFixed(1)}%)')" onmouseleave="this.style.opacity=.9;hideTip()" onclick="openTrend('${escName}')"/>`;
    angle+=sweep;
  });
  svg.innerHTML=paths;
  document.getElementById('donut-legend').innerHTML=pie.map((item,i)=>{
    const pct=(item.qty/total*100).toFixed(1);
    const escName=item.name.replace(/'/g,"\'");
    return `<div class="leg-item" onclick="openTrend('${escName}')" onmouseenter="tip(event,'${escName}')" onmouseleave="hideTip()">
      <div class="leg-dot" style="background:${COLORS[i%COLORS.length]}"></div>
      <div class="leg-name" title="${item.name}">${item.name}</div>
      <div class="leg-pct">${pct}%</div>
      <div class="leg-qty">${item.qty}</div>
    </div>`;
  }).join('');
}

function deg(cx,cy,r,a){const rad=a*Math.PI/180;return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};}

/* ─── ITEM TREND MODAL ─── */
function openTrend(name){
  const trend=trends()[name];
  if(!trend)return;
  const months=DATA[tab].months;
  document.getElementById('modal-title').textContent='📈 '+name+' · 월별 사용량 추이';
  // Table
  const tbody=document.querySelector('#modal-table tbody');
  tbody.innerHTML=months.map(m=>{
    const v=trend[m]||{total:0,'A팀':0,'B팀':0};
    return `<tr><td>${m}</td><td class="td-total">${v.total}</td><td class="td-a">${v['A팀']}</td><td class="td-b">${v['B팀']}</td></tr>`;
  }).join('');
  // Canvas chart
  drawChart(name,trend,months);
  document.getElementById('modal-overlay').classList.add('open');
}

function drawChart(name,trend,months){
  const canvas=document.getElementById('trend-canvas');
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const w=canvas.offsetWidth||600,h=canvas.offsetHeight||200;
  canvas.width=w*dpr;canvas.height=h*dpr;
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  const pad={l:38,r:20,t:16,b:36};
  const cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  const totals=months.map(m=>(trend[m]||{total:0}).total);
  const as=months.map(m=>(trend[m]||{'A팀':0})['A팀']);
  const bs=months.map(m=>(trend[m]||{'B팀':0})['B팀']);
  const mx=Math.max(...totals,1);
  const n=months.length;
  function xPos(i){return pad.l+i*(cw/(n-1));}
  function yPos(v){return pad.t+ch-(v/mx)*ch;}
  // Grid
  ctx.strokeStyle='#21262d';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pad.t+ch*(i/4);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cw,y);ctx.stroke();
    ctx.fillStyle='#6e7681';ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText(Math.round(mx*(1-i/4)),pad.l-5,y+4);
  }
  // Month labels
  ctx.fillStyle='#8b949e';ctx.font='10px sans-serif';ctx.textAlign='center';
  months.forEach((m,i)=>{ctx.fillText(m.replace('20',''),xPos(i),h-pad.b+14);});
  // Lines
  function drawLine(vals,color,lw){
    ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.lineJoin='round';
    ctx.beginPath();
    vals.forEach((v,i)=>{i===0?ctx.moveTo(xPos(i),yPos(v)):ctx.lineTo(xPos(i),yPos(v));});
    ctx.stroke();
  }
  function drawDots(vals,color){
    vals.forEach((v,i)=>{
      if(v===0)return;
      ctx.beginPath();ctx.arc(xPos(i),yPos(v),4,0,Math.PI*2);
      ctx.fillStyle=color;ctx.fill();
      ctx.fillStyle='#fff';ctx.font='10px sans-serif';ctx.textAlign='center';
      ctx.fillText(v,xPos(i),yPos(v)-8);
    });
  }
  drawLine(totals,'#388bfd',2.5);
  drawLine(as,'#79c0ff',1.5);
  drawLine(bs,'#56d364',1.5);
  drawDots(totals,'#388bfd');
  drawDots(as,'#79c0ff');
  drawDots(bs,'#56d364');
}

function closeModal(e){
  if(!e||e.target===document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('modal-overlay').classList.remove('open');});

/* ─── TOOLTIP ─── */
function tip(e,text){
  const t=document.getElementById('tooltip');
  t.innerHTML=text.replace(/\n/g,'<br>');
  t.style.display='block';
  moveTip(e);
}
function hideTip(){document.getElementById('tooltip').style.display='none';}
function moveTip(e){
  const t=document.getElementById('tooltip');
  t.style.left=(e.clientX+14)+'px';t.style.top=(e.clientY+14)+'px';
}
document.addEventListener('mousemove',moveTip);
